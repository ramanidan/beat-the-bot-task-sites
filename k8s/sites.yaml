# Beat-the-bot static task sites (Vite dist: data-site, form-site, shared /assets).
# In-cluster (Anchor browser sessions): http://beat-the-bot-sites.beat-the-bot.svc.cluster.local/data-site/index.html
# From host (Docker Desktop): http://127.0.0.1:30888/data-site/index.html
apiVersion: v1
kind: Namespace
metadata:
  name: beat-the-bot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat-the-bot-sites
  namespace: beat-the-bot
  labels:
    app: beat-the-bot-sites
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beat-the-bot-sites
  template:
    metadata:
      labels:
        app: beat-the-bot-sites
    spec:
      containers:
        - name: nginx
          image: beat-the-bot-sites:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /data-site/index.html
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /data-site/index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: beat-the-bot-sites
  namespace: beat-the-bot
  labels:
    app: beat-the-bot-sites
spec:
  type: NodePort
  selector:
    app: beat-the-bot-sites
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30888
